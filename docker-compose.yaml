version: "3"
services:
  xray:
    image: "teddysun/xray:latest"
    container_name: "xray"
    volumes:
      - "/opt/xray/config.json:/etc/xray/config.json"
    expose:
      - "10010"
    deploy:
      restart_policy:
        condition: "on-failure"
      replicas: 2
  nginx:
    image: "nginx:alpine"
    container_name: "nginx"
    ports:
     - "80:80"
    volumes:
      - "/opt/nginx/default.conf:/etc/nginx/conf.d/default.conf"
    depends_on:
      - "xray"
    restart: "unless-stopped"